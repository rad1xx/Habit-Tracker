<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>День 2</title>


    <style>
        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        .habit-card,
        .habit-crd {
            background-color: steelblue;
            padding: 5px;
            width: 320px;
            margin-bottom: 14px;
            border-radius: 20px;
        }

        .habit-crd {
            background-color: lightcoral;

        }

        .days {
            color: white;
        }

        .day {
            display: inline-block;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: rgb(110, 110, 183);
            text-align: center;
            line-height: 36px;
        }


        .add-btn {
            cursor: pointer;
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            border: none;
            background-color: rgb(27, 180, 10);
        }

        body {
            background-color: rgb(48, 49, 48);
        }

        h1 {
            color: white;
            padding: 20px;
        }

        .day.active {
            background-color: rgb(21, 226, 59);
        }

        .day:hover {
            transition: background-color 0.2s;
            cursor: pointer;
        }

        
    </style>
</head>



<body>



    <div class="container">
        <h1>Мои привычки!</h1>
        <div class="habit-card">

            <h3>1 habit</h3>

            <div class="days">
                <span class="day">Пн</span>
                <span class="day">вт</span>
                <span class="day">ср</span>
                <span class="day">чт</span>
                <span class="day">пт</span>
                <span class="day">сб</span>
                <span class="day">вс</span>
            </div>
        </div>

        <div class="habit-crd">

            <h3>2 habit</h3>

            <div class="days">
                <span class="day">Пн</span>
                <span class="day">вт</span>
                <span class="day">ср</span>
                <span class="day">чт</span>
                <span class="day">пт</span>
                <span class="day">сб</span>
                <span class="day">вс</span>
            </div>
        </div>
    </div>
    <button class="add-btn">+</button>
    <script src="app.js"></script>
</body>


</html>
